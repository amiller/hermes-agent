services:
  conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: conduit-homeserver
    ports:
      - "6167:6167"
    environment:
      - CONDUIT_CONFIG=/etc/conduit.toml
    volumes:
      - ./conduit.toml:/etc/conduit.toml:ro
      - conduit-data:/var/lib/conduit
    networks:
      - matrix-test

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: hermes-gateway-test
    volumes:
      - ../:/hermes
      - gateway-pip:/root/.cache/pip
    working_dir: /hermes
    environment:
      - HERMES_HS_URL=http://conduit:6167
      - HERMES_MATRIX_USER=@gateway:conduit
      - HERMES_MATRIX_PASSWORD=gateway_password
    depends_on:
      - conduit
    networks:
      - matrix-test
    command: bash -c "pip install --no-cache-dir -r requirements.txt && pip install --no-cache-dir -e . && sleep infinity"

networks:
  matrix-test:
    driver: bridge

volumes:
  conduit-data:
  gateway-pip:
